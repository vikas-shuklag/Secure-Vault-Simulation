version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - hsm_keys_volume:/app/virtual_hsm/storage
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hsm_pki
      POSTGRES_USER: hsm_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-local_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pg_data:
  hsm_keys_volume:
